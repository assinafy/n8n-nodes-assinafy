# Publishes @assinafy/n8n-nodes-assinafy to the GitHub Packages npm registry
# whenever a version tag is pushed.
#
# Authentication: the built-in GITHUB_TOKEN is used. No external secrets are
# required when the token's default permissions include `packages: write`
# (granted explicitly in this workflow).
#
# Tag convention: tags matching `*.*.*` (e.g. `0.2.0`). If you prefer `v`-
# prefixed tags (e.g. `v0.2.0`), change the filter below to `v*.*.*`.
#
# Local release flow:
#   npm run release
# which lints, builds, bumps the version, commits the changelog, tags, and
# pushes — the tag push triggers this workflow to publish.
#
# Dual-publishing to npmjs.com (optional): add an additional job that sets
# `registry-url: 'https://registry.npmjs.org'` and uses an `NPM_TOKEN`
# secret (or OIDC trusted publishing). Remove the `publishConfig.registry`
# field from package.json only if you drop GitHub Packages entirely.

name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@assinafy'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
